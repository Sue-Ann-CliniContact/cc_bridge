{% extends "base.html" %}
{% block title %}Something went wrong{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
  <div class="surface-card p-10">
    <h1 class="text-2xl font-black text-cc-ink">We hit a snag</h1>
    <p class="mt-3 text-sm text-cc-muted">{{ message }}</p>
    {% if debug %}
      <pre class="mt-4 overflow-auto rounded-xl bg-slate-50 p-4 text-xs text-slate-700">{{ debug|pprint }}</pre>
    {% endif %}
    <a href="{% url 'home' %}" class="cc-btn cc-btn-ghost mt-6">Back to login</a>
  </div>
</div>
{% endblock %}
