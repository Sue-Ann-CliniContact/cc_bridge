databases:
  - name: cc-bridge-db
    plan: starter
    databaseName: cc_bridge
    user: cc_bridge

services:
  - type: web
    name: cc-bridge
    runtime: python
    plan: starter
    buildCommand: "./build.sh"
    startCommand: "gunicorn bridge.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: cc-bridge.onrender.com
      - key: APP_BASE_URL
        value: https://cc-bridge.onrender.com
      - key: DB_INTERNAL
        fromDatabase:
          name: cc-bridge-db
          property: connectionString

      # Monday OAuth — set via Render dashboard after creating Developer App
      - key: MONDAY_CLIENT_ID
        sync: false
      - key: MONDAY_CLIENT_SECRET
        sync: false
      - key: MONDAY_REDIRECT_URI
        value: https://cc-bridge.onrender.com/oauth/callback/
      - key: MONDAY_WORKSPACE_ID
        sync: false

      # Instantly — existing key
      - key: INSTANTLY_API_KEY
        sync: false

      # Anthropic — Phase 3 (email drafting). Safe to leave blank for Phase 1.
      - key: ANTHROPIC_API_KEY
        sync: false

      # Apollo — Phase 2. Leave blank until the key is in hand.
      - key: APOLLO_API_KEY
        sync: false
      - key: APOLLO_MONTHLY_BUDGET_CREDITS
        value: "1000"
